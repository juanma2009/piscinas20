<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="admin/admin_layout.html">

<head>
    <title th:text="${titulo}"></title>
    <!-- Solo CSS propio (jQuery/Bootstrap/DataTables ya vienen del layout) -->
    <link rel="stylesheet" th:href="@{/css/table.css}" />

    <style>
        /* ✅ En móvil y tablets: botones e iconos mucho más grandes para mejor usabilidad */
        @media (max-width: 1024px) {
            .toolbar .btn {
                width: auto !important;
                padding: 10px 18px !important;
                font-size: 16px !important;
            }

            .table .btn-sm {
                padding: 10px !important;
                font-size: 1.4rem !important;
                margin-right: 10px !important;
                min-width: 45px;
                min-height: 45px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div layout:fragment="content">
        <div class="container-fluid px-2 px-md-3">
            <section class="content-header">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-calendar-alt mr-2"></i> <span th:text="${titulo}"></span>
                    </div>

                    <div class="toolbar d-none d-md-flex">
                        <a th:href="@{/citas/form}" class="btn btn-success btn-sm">
                            <i class="fas fa-plus mr-1"></i> Nueva Cita
                        </a>
                        <a th:href="@{/pedidos/listarPedidos}" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-list mr-1"></i> Pedidos
                        </a>
                        <a th:href="@{/pedidos/listarFotosPedidos}" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-images mr-1"></i> Galería
                        </a>
                        <a th:href="@{/listar}" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-users mr-1"></i> Clientes
                        </a>
                        <a th:href="@{/proveedor/listarProveedor}" class="btn btn-outline-info btn-sm">
                            <i class="fas fa-truck mr-1"></i> Proveedores
                        </a>
                        <a th:href="@{/materiales/listarMaterial}" class="btn btn-outline-info btn-sm">
                            <i class="fas fa-boxes mr-1"></i> Inventario
                        </a>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="toggleBusqueda">
                            <i class="fas fa-search mr-1"></i> Filtros
                        </button>
                    </div>

                    <div class="card-body">
                        <div id="formBusqueda" style="display:none; margin-bottom: 1.5rem;">
                            <form th:action="@{/citas/buscar}" method="post" class="row bg-light p-3 rounded shadow-sm">
                                <div class="col-12 col-md-4 mb-2">
                                    <label for="cliente" class="form-label font-weight-bold">Cliente</label>
                                    <select id="cliente" name="cliente" class="form-control form-control-sm">
                                        <option value="">Todos los clientes</option>
                                        <option th:each="c : ${clientes}" th:value="${c.id}"
                                            th:text="${c.nombre + ' ' + c.apellido}"></option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-4 mb-2">
                                    <label for="tipo" class="form-label font-weight-bold">Tipo de Cita</label>
                                    <select id="tipo" name="tipo" class="form-control form-control-sm">
                                        <option value="">Todos los tipos</option>
                                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-4 mb-2">
                                    <label for="estado" class="form-label font-weight-bold">Estado</label>
                                    <select id="estado" name="estado" class="form-control form-control-sm">
                                        <option value="">Todos los estados</option>
                                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-5 mb-2">
                                    <label for="fechaDesde" class="form-label font-weight-bold">Fecha/Hora Desde</label>
                                    <input type="datetime-local" id="fechaDesde" name="fechaDesde"
                                        class="form-control form-control-sm">
                                </div>
                                <div class="col-12 col-md-5 mb-2">
                                    <label for="fechaHasta" class="form-label font-weight-bold">Fecha/Hora Hasta</label>
                                    <input type="datetime-local" id="fechaHasta" name="fechaHasta"
                                        class="form-control form-control-sm">
                                </div>
                                <div class="col-12 col-md-2 d-flex align-items-end mb-2">
                                    <button type="submit" class="btn btn-primary btn-sm w-100">
                                        <i class="fas fa-filter mr-1"></i> Filtrar
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered table-striped datatable w-100" data-dt="auto">
                                <thead class="table-dark">
                                    <tr>
                                        <th class="text-center">Fecha y Hora</th>
                                        <th>Cliente</th>
                                        <th class="text-center">Tipo</th>
                                        <th class="text-center">Pedido</th>
                                        <th class="text-center">Estado</th>
                                        <th>Observaciones</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cita : ${citas}">
                                        <td class="text-center font-weight-bold"
                                            th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td>
                                            <a th:if="${cita.cliente != null}" th:href="@{'/ver/' + ${cita.cliente.id}}"
                                                th:text="${cita.cliente.nombre + ' ' + cita.cliente.apellido}"
                                                class="font-weight-bold text-primary"></a>
                                        </td>
                                        <td class="text-center">
                                            <span th:if="${cita.tipo != null}"
                                                th:classappend="${cita.tipo.name() == 'ENTREGA_TRABAJO' ? 'badge-info' :
                                                               (cita.tipo.name() == 'RECOGIDA_PEDIDO' ? 'badge-success' : 'badge-warning')}"
                                                class="badge px-2 py-1" style="font-size:0.8rem; min-width:80px;"
                                                th:text="${cita.tipo}"></span>
                                        </td>
                                        <td class="text-center">
                                            <a th:if="${cita.pedido != null}"
                                                th:href="@{'/pedidos/ver/' + ${cita.pedido.npedido}}"
                                                th:text="${cita.pedido.ref != null ? cita.pedido.ref : '#' + cita.pedido.npedido}"
                                                class="badge badge-dark p-2"></a>
                                            <span th:if="${cita.pedido == null}">-</span>
                                        </td>
                                        <td class="text-center">
                                            <span th:if="${cita.estado != null}"
                                                th:classappend="${cita.estado.name() == 'PROGRAMADA' ? 'badge-primary' : 
                                                          (cita.estado.name() == 'COMPLETADA' ? 'badge-success' : 
                                                          (cita.estado.name() == 'AUSENTE' ? 'badge-warning' : 'badge-danger'))}"
                                                class="badge px-2 py-1" style="font-size:0.8rem; min-width:90px;"
                                                th:text="${cita.estado}"></span>
                                        </td>
                                        <td th:text="${cita.observacion}" class="text-wrap" style="max-width: 250px;">
                                        </td>
                                        <td class="text-center" style="white-space: nowrap;">
                                            <a th:href="@{'/citas/form/editar/' + ${cita.id}}"
                                                class="btn btn-outline-warning btn-sm mr-1" title="Editar">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{'/citas/eliminar/' + ${cita.id}}"
                                                class="btn btn-outline-danger btn-sm" title="Eliminar"
                                                onclick="return confirm('¿Seguro que desea eliminar esta cita?');">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div layout:fragment="script">
        <script>
            $(document).ready(function () {
                $('#toggleBusqueda').on('click', function () {
                    $('#formBusqueda').slideToggle(300);
                });
            });
        </script>
    </div>

</body>

</html>
