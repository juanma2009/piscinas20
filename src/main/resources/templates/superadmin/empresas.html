<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="/admin/admin_layout">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Gestión de Clientes</title>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark">Gestión de Clientes / Empresas</h1>
                </div>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Listado de Empresas Registradas</h3>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>CIF</th>
                                <th>Email</th>
                                <th>Licencia</th>
                                <th>Fecha Registro</th>
                                <th>Estado</th>
                                <th class="col-acciones-wide"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="empresa : ${empresas}">
                                <td th:text="${empresa.id}"></td>
                                <td th:text="${empresa.nombre}"></td>
                                <td th:text="${empresa.cif}"></td>
                                <td th:text="${empresa.email}"></td>
                                <td th:text="${empresa.licencia}"></td>
                                <td th:text="${#dates.format(empresa.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span th:if="${empresa.activo}" class="badge badge-success">Activo</span>
                                    <span th:if="${!empresa.activo}" class="badge badge-danger">Inactivo / Suspendido</span>
                                </td>
                                <td class="col-acciones-wide">
                                    <!-- Accesos rápidos -->
                                    <a class="btn-quick-icon text-success" th:href="@{/superadmin/ingresos(empresaId=${empresa.id})}" title="Ver Ingresos">
                                        <i class="fas fa-money-bill-wave"></i>
                                    </a>
                                    <a class="btn-quick-icon text-info" href="#" title="Editar Empresa">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <!-- Más acciones -->
                                    <div class="dropdown d-inline">
                                        <button class="btn-action-trigger dropdown-toggle" type="button" data-toggle="dropdown" data-boundary="window" aria-haspopup="true" aria-expanded="false">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                                            <form th:action="@{/superadmin/empresas/toggle-status}" method="post">
                                                <input type="hidden" name="id" th:value="${empresa.id}"/>
                                                <button type="submit" class="dropdown-item">
                                                    <i th:class="${empresa.activo} ? 'fas fa-ban mr-2' : 'fas fa-check-circle mr-2'"></i>
                                                    <span th:text="${empresa.activo} ? 'Desactivar Empresa' : 'Activar Empresa'"></span>
                                                </button>
                                            </form>
                                            <a th:href="@{/superadmin/ingresos(empresaId=${empresa.id})}" class="dropdown-item">
                                                <i class="fas fa-money-bill-wave mr-2"></i> Ver Ingresos
                                            </a>
                                            <div class="dropdown-divider"></div>
                                            <a href="#" class="dropdown-item text-info">
                                                <i class="fas fa-edit mr-2"></i> Editar Datos
                                            </a>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
