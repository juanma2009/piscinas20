<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="/admin/admin_layout">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Gestión de Incidencias</title>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header">
        <div class="container-fluid">
            <h1 class="m-0 text-dark">Gestión de Incidencias de Clientes</h1>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Incidencias Reportadas</h3>
                </div>
                <div class="card-body p-0">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Cliente</th>
                                <th>Asunto</th>
                                <th>Prioridad</th>
                                <th>Estado</th>
                                <th class="col-acciones"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="inc : ${incidencias}">
                                <td th:text="${#dates.format(inc.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${inc.empresa.nombre}"></td>
                                <td th:text="${inc.asunto}"></td>
                                <td>
                                    <span th:class="${inc.prioridad == 'Alta'} ? 'badge badge-danger' : 'badge badge-info'"
                                          th:text="${inc.prioridad}">
                                    </span>
                                </td>
                                <td>
                                    <span th:class="${inc.estado == 'PENDIENTE'} ? 'badge badge-warning' : 'badge badge-success'"
                                          th:text="${inc.estado}">
                                    </span>
                                </td>
                                <td class="col-acciones">
                                    <div class="dropdown">
                                        <button class="btn-action-trigger dropdown-toggle" type="button" data-toggle="dropdown" data-boundary="window" aria-haspopup="true" aria-expanded="false">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                                            <a class="dropdown-item" href="#"
                                               th:attr="data-descripcion=${inc.descripcion}"
                                               onclick="mostrarDetalleIncidencia(this)">
                                                <i class="fas fa-info-circle mr-2"></i> Ver Detalle
                                            </a>
                                            <div class="dropdown-divider"></div>
                                            <form th:action="@{/superadmin/incidencias/cambiar-estado}" method="post" id="formCambiarEstado">
                                                <input type="hidden" name="id" th:value="${inc.id}"/>
                                                <h6 class="dropdown-header">Cambiar Estado</h6>
                                                <button type="submit" name="estado" value="PENDIENTE" class="dropdown-item" th:classappend="${inc.estado == 'PENDIENTE'} ? 'active' : ''">PENDIENTE</button>
                                                <button type="submit" name="estado" value="PROCESO" class="dropdown-item" th:classappend="${inc.estado == 'PROCESO'} ? 'active' : ''">EN PROCESO</button>
                                                <button type="submit" name="estado" value="CERRADO" class="dropdown-item" th:classappend="${inc.estado == 'CERRADO'} ? 'active' : ''">CERRADO</button>
                                            </form>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>

<!-- Modal Detalle Incidencia -->
<div class="modal fade" id="modalDetalleIncidencia" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-info-circle mr-2"></i>Detalle de la Incidencia</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body py-4">
                <p id="detalleIncidenciaTexto" class="lead"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script>
    function mostrarDetalleIncidencia(el) {
        var desc = el.getAttribute('data-descripcion') || 'Sin descripción.';
        document.getElementById('detalleIncidenciaTexto').textContent = desc;
        $('#modalDetalleIncidencia').modal('show');
    }
</script>

</div>

</body>
</html>
