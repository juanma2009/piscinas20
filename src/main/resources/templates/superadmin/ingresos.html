<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorator="/admin/admin_layout">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Control de Ingresos</title>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header">
        <div class="container-fluid">
            <h1 class="m-0 text-dark">Control de Ingresos por Cliente</h1>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card card-primary">
                <div class="card-header">
                    <h3 class="card-title">Registrar Nuevo Pago de Cliente</h3>
                </div>
                <form th:action="@{/superadmin/ingresos/guardar}" method="post" class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label>Cliente / Empresa</label>
                            <select name="empresaId" class="form-control" required>
                                <option value="">Seleccione Empresa...</option>
                                <option th:each="empresa : ${empresas}" th:value="${empresa.id}" th:text="${empresa.nombre}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label>Importe (€)</label>
                            <input type="number" step="0.01" name="importe" class="form-control" placeholder="0.00" required/>
                        </div>
                        <div class="col-md-4">
                            <label>Concepto</label>
                            <input type="text" name="concepto" class="form-control" placeholder="Ej. Cuota Mensual" required/>
                        </div>
                        <div class="col-md-2">
                            <label>&nbsp;</label>
                            <button type="submit" class="btn btn-primary btn-block">Registrar Pago</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card mt-4">
                <div class="card-header">
                    <h3 class="card-title">Historial de Ingresos</h3>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Empresa</th>
                                <th>Concepto</th>
                                <th>Importe</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ingreso : ${ingresos}">
                                <td th:text="${#dates.format(ingreso.fecha, 'dd/MM/yyyy')}"></td>
                                <td th:text="${ingreso.empresa.nombre}"></td>
                                <td th:text="${ingreso.concepto}"></td>
                                <td th:text="${#numbers.formatDecimal(ingreso.importe, 0, 'COMMA', 2, 'POINT')} + '€'"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
