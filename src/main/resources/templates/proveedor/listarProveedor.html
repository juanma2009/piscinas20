<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="admin/admin_layout.html">

<head>
    <meta charset="utf-8"/>
    <title>Listado de Proveedores</title>
    <!-- Solo CSS propio (jQuery/Bootstrap/DataTables ya vienen del layout) -->
    <link rel="stylesheet" th:href="@{/css/table.css}"/>

    <style>
        /* ✅ En móvil y tablets: botones e iconos mucho más grandes para mejor usabilidad */
        @media (max-width: 1024px) {
            .toolbar .btn {
                width:auto !important;
                padding: 10px 18px !important;
                font-size: 16px !important;
            }

            .table .btn-sm {
                padding: 10px !important;
                font-size: 1.4rem !important;
                margin-right: 10px !important;
                min-width: 45px;
                min-height: 45px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>

<div layout:fragment="content">
    <div class="container-fluid px-2 px-md-3">
        <section class="content-header">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-truck mr-2"></i> Listado de Proveedores
                </div>

                <div class="toolbar d-none d-md-flex">
                    <a th:href="@{/pedidos/listarPedidos}" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-list mr-1"></i> Pedidos
                    </a>
                    <a th:href="@{/pedidos/listarFotosPedidos}" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-images mr-1"></i> Galería
                    </a>
                    <a th:href="@{/listar}" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-users mr-1"></i> Clientes
                    </a>
                    <a th:href="@{/materiales/listarMaterial}" class="btn btn-outline-info btn-sm">
                        <i class="fas fa-boxes mr-1"></i> Inventario
                    </a>
                    <a th:href="@{/materiales/form}" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-box mr-1"></i> Crear Material
                    </a>
                    <a th:href="@{/proveedor/form}" class="btn btn-success btn-sm">
                        <i class="fas fa-plus mr-1"></i> Crear Proveedor
                    </a>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="toggleBusqueda">
                        <i class="fas fa-search mr-1"></i> Filtros
                    </button>
                </div>

                <div class="card-body">
                    <div id="formBusqueda" style="display:none; margin-bottom: 1.5rem;">
                        <form th:action="@{/proveedor/buscar}" method="post" class="row bg-light p-3 rounded shadow-sm">
                            <div class="col-12 col-md-8 mb-2">
                                <label for="nombre" class="form-label font-weight-bold">Nombre del Proveedor</label>
                                <div class="input-group">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text"><i class="fas fa-user-tie"></i></span>
                                    </div>
                                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej: Proveedor S.A.">
                                </div>
                            </div>
                            <div class="col-12 col-md-4 d-flex align-items-end mb-2">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-filter mr-1"></i> Aplicar Filtro
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-bordered datatable w-100"
                               id="tablaProveedores"
                               data-dt="auto"
                               data-dt-hide-mobile="2,3,4">
                            <thead class="table-dark text-center align-middle">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th class="col-hide-mobile">Dirección</th>
                                <th class="col-hide-mobile">Teléfono</th>
                                <th class="col-hide-mobile">Email</th>
                                <th class="text-center">ACCIONES</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="proveedor:${proveedor}">
                                <td th:text="${proveedor.nproveedor}" class="text-center"></td>
                                <td th:text="${proveedor.vnombre}" class="font-weight-bold"></td>
                                <td th:text="${proveedor.vdireccion}"></td>
                                <td th:text="${proveedor.ntelefono}"></td>
                                <td th:text="${proveedor.vemail}"></td>
                                <td class="text-nowrap text-center">
                                    <a class="btn btn-outline-primary btn-sm"
                                       th:href="@{/proveedor/form/} + ${proveedor.nproveedor}" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a class="btn btn-outline-danger btn-sm"
                                       th:href="@{/proveedor/eliminar/} + ${proveedor.nproveedor}" 
                                       title="Eliminar"
                                       onclick="return confirm('¿Estás seguro de eliminar este proveedor?');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div layout:fragment="script">
    <script>
        $(document).ready(function() {
            $('#toggleBusqueda').click(function() {
                $('#formBusqueda').slideToggle();
            });
        });
    </script>
</div>

</html>
