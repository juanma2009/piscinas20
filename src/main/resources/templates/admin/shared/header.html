<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Artesanal Joyería</title>
    <link rel="stylesheet" href="/style.css">
</head>
<style>
/* Reset base */
html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* 📱 Ajustes de cabecera solo para móvil */
@media (max-width: 768px) {
    .navbar-brand {
        max-width: 280px;           /* Permitir más espacio para ver la empresa */
        margin-right: 0.25rem !important;
        padding-left: 0.5rem !important;
    }
    
    .company-tag {
        padding: 2px 10px !important;
        font-size: 0.75rem !important;
        max-width: 150px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    /* Juntar más los iconos de notificaciones y usuario */
    .navbar-nav .nav-link {
        padding-left: 0.3rem !important;
        padding-right: 0.3rem !important;
    }
}
</style>
<body>
<!-- Navbar -->
<nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Links de la izquierda: Botón de Menú y Logo -->
    <ul class="navbar-nav align-items-center">
        <li class="nav-item">
            <a class="nav-link px-3" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
        </li>
        <li class="nav-item d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center py-0" href="/" th:href="@{/}" style="gap: 0.75rem; margin-right: 0;">
                <span class="d-none d-sm-inline font-weight-bold" style="color: #004085; letter-spacing: -0.5px;">Taller Artesanal <span style="color: #0062cc;">Joyería</span></span>
                <span class="d-inline d-sm-none font-weight-bold" style="color: #004085;">TAJ</span>
                <div class="company-tag d-flex align-items-center ml-2" 
                     sec:authorize="isAuthenticated()"
                     style="background: #f0f7ff; color: #0062cc; padding: 4px 12px; border-radius: 50px; border: 1px solid #cce5ff; font-size: 0.85rem; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                    <i class="fas fa-building mr-2" style="font-size: 0.75rem; opacity: 0.8;"></i>
                    <span sec:authentication="principal.empresaNombre">Empresa</span>
                </div>
            </a>
        </li>
    </ul>

    <!-- Right navbar links -->
    <ul class="navbar-nav ml-auto">
            <!-- Notificaciones -->
            <li class="nav-item dropdown">
                <a aria-expanded="false" class="nav-link" data-toggle="dropdown" href="#" role="button">
                    <i class="fas fa-bell"></i>
                    <span class="badge badge-warning navbar-badge" th:text="${total}">3</span>
                </a>
                <div class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
                    <span class="dropdown-item dropdown-header"
                          th:text="${total} + ' Notifications'">3 Notifications</span>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="#">
                        <i class="fas fa-envelope mr-2"></i> Nuevos mensajes
                        <span class="float-right text-muted text-sm">3 mins</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item dropdown-footer" th:href="@{'/notifications/notifications'}">Ver todas</a>
                </div>
            </li>

            <!-- Usuario y Logout en un Dropdown -->
            <li class="nav-item dropdown">
                <a aria-expanded="false" class="nav-link" data-toggle="dropdown" href="#" role="button">
                    <i class="fas fa-user"></i>
                    <!-- Mostrar nombre solo en modo escritorio (tablets para arriba) -->
                    <span class="d-none d-md-inline ml-1" sec:authentication="name"></span> 
                </a>
                <div class="dropdown-menu dropdown-menu-right">
                    <a class="dropdown-item" th:href="@{/user/profile}">
                        <i class="fas fa-user-circle mr-2"></i> Perfil
                    </a>
                    <a class="dropdown-item" th:href="@{/configuracion}">
                        <i class="fas fa-list-ul mr-2"></i> Personalizar Opciones
                    </a>
                    <div class="dropdown-divider"></div>
                    <form method="post" th:action="@{/logout}" th:object="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <button class="dropdown-item" type="submit">
                            <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
                        </button>
                    </form>
                </div>
            </li>
        </ul>
</nav>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    $(document).ready(function () {
        function fetchNotificationCount() {
            $.ajax({
                url: '/notifications/count',
                method: 'GET',
                success: function (data) {
                    $('.navbar-badge').text(data);
                },
                error: function (error) {
                    console.error('Error fetching notification count:', error);
                }
            });
        }
        fetchNotificationCount();
        setInterval(fetchNotificationCount, 30000); // 30s
    });
</script>
<!-- /.navbar -->
</body>
</html>
