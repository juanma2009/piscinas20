<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- jQuery UI (si lo usas) -->
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style th:replace="admin/shared/style"></style>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- DataTables CSS + Responsive -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        /* Estabilización del layout para evitar saltos */
        html {
            /* 1. Reserva el espacio de la barra de scroll para evitar el movimiento horizontal */
            scrollbar-gutter: stable;
            height: 100%;
        }

        body {
            height: 100% !important;
            margin: 0;
            padding: 0;
            /* 2. Evitamos el scroll horizontal y dejamos que AdminLTE maneje el vertical */
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Asegurar que el wrapper ocupe todo el espacio sin saltos */
        .wrapper {
            position: relative;
            min-height: 100%;
            display: block; /* AdminLTE prefiere block sobre flex en el wrapper principal */
        }

        .content-wrapper {
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            /* 3. Evitamos el uso de 100vh que suele causar scroll prematuro al sumarse al navbar */
            min-height: calc(100vh - 57px) !important; 
        }

        .content-wrapper > .container-fluid {
            padding-left: .5rem;
            padding-right: .5rem;
            flex: 1;
        }
        @media (min-width: 768px) {
            .content-wrapper > .container-fluid {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }

        @media (max-width: 768px) {
            .main-sidebar, .left-side, .sidebar {
                display: none !important;
            }
            .content-wrapper {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

<body class="sidebar-mini layout-fixed control-sidebar-slide-open">
<script>
    // Evitar el "rebote" de hold-transition quitando la clase inmediatamente
    document.body.classList.remove('hold-transition');
</script>
<div class="wrapper">

    <!-- Header -->
    <div th:replace="admin/shared/header"></div>

    <!-- Sidebar -->
    <div th:replace="admin/shared/left_side"></div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="container-fluid">
            <div id="mainContent" class="content">
                <div id="contentFragment" layout:fragment="content">
                    <!-- Aquí va tu contenido -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts comunes -->
    <div th:replace="admin/shared/file_script"></div>

</div>

<!-- Popper (si lo necesitas y no lo trae file_script) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>

<!-- ✅ JS del layout (UNA sola vez) -->
<script>
    // Navegación AJAX
    $(document).on("click", "a.ajax-link", function (e) {
        e.preventDefault();
        const url = $(this).attr("href");

        $("#mainContent").html(
            '<div class="text-center p-5"><i class="fa fa-spinner fa-spin fa-3x"></i><br>Cargando...</div>'
        );

        $("#mainContent").load(url + " #contentFragment", function (response, status) {
            if (status === "error") {
                $("#mainContent").html("<div class='alert alert-danger'>Error al cargar esta sección.</div>");
                return;
            }
            // ✅ re-init automático SOLO para tablas "auto"
            if (window.initAutoDataTables) window.initAutoDataTables("#mainContent");
        });
    });

    // Carga normal
    $(function () {
        if (window.initAutoDataTables) window.initAutoDataTables(document);
        initDynamicMobileFAB();
        initAutoCollapseSidebar();
    });

    // ==========================================
    // 🛠️ AUTO COLLAPSE SIDEBAR (Landscape/Tablets)
    // ==========================================
    function initAutoCollapseSidebar() {
        function checkOrientation() {
            // Si es landscape en móviles grandes o tablets (menor a 1024px)
            if (window.innerWidth <= 1024 && window.innerWidth > window.innerHeight) {
                $('body').addClass('sidebar-collapse').removeClass('sidebar-open');
            }
        }
        
        // Revisar al cargar y al rotar la pantalla
        checkOrientation();
        $(window).on('resize orientationchange', checkOrientation);
    }

    // ==========================================
    // 🔘 GLOBAL DYNAMIC FAB GENERATOR PARA MÓVILES
    // ==========================================
    function initDynamicMobileFAB() {
        const $toolbar = $('.toolbar');
        if ($toolbar.length === 0) return;

        // Limpiar FABs previos inyectados estáticamente para evitar duplicados
        $('.fab-wrapper').remove();

        // Ocultar el toolbar original en móviles
        $toolbar.addClass('d-none d-md-flex');

        // Construir la estructura principal del FAB
        let fabHtml = `
        <div class="fab-wrapper d-block d-md-none">
            <div class="fab-menu" id="DynamicFabMenu">`;

        // Procesar los botones del toolbar (invertidos para que el primero quede más abajo)
        const $buttons = $toolbar.find('a, button').filter(function() {
             return $(this).text().trim() !== ''; 
        }).get().reverse();

        $($buttons).each(function() {
            const $el = $(this);
            const iconHtml = $el.find('i').prop('outerHTML') || '<i class="fas fa-chevron-right"></i>';
            const labelText = $el.text().trim();
            
            // Colores por defecto según clase
            let btnClasses = "fab-item text-white border-0 ";
            if ($el.hasClass("btn-outline-success") || $el.hasClass("btn-success") || labelText.includes('Nuevo')) btnClasses += "bg-success";
            else if ($el.hasClass("btn-outline-info") || $el.hasClass("btn-info") || labelText.includes('Galería')) btnClasses += "bg-info";
            else if ($el.hasClass("btn-outline-warning") || $el.hasClass("btn-warning") || labelText.includes('Filtros')) btnClasses += "bg-warning text-dark";
            else if ($el.hasClass("btn-outline-danger") || $el.hasClass("btn-danger")) btnClasses += "bg-danger";
            else btnClasses += "bg-primary";

            if ($el.is('a')) {
                const href = $el.attr('href');
                let extraAttributes = '';
                if($el.attr('data-toggle')) extraAttributes += `data-toggle="${$el.attr('data-toggle')}" `;
                if($el.attr('data-target')) extraAttributes += `data-target="${$el.attr('data-target')}" `;

                fabHtml += `
                <div class="fab-item-container">
                    <span class="fab-label">${labelText}</span>
                    <a href="${href}" class="${btnClasses}" title="${labelText}" ${extraAttributes}>${iconHtml}</a>
                </div>`;
            } else {
                const targetId = $el.attr('id') || ''; 
                fabHtml += `
                <div class="fab-item-container">
                    <span class="fab-label">${labelText}</span>
                    <button type="button" class="${btnClasses}" data-proxy-target="${targetId}" title="${labelText}">${iconHtml}</button>
                </div>`;
            }
        });

        fabHtml += `
            </div>
            <button type="button" class="fab-btn bg-primary text-white" id="DynamicFabMainBtn">
                <i class="fas fa-plus"></i>
            </button>
        </div>`;

        // Injectar al DOM
        $('body').append(fabHtml);

        // Lógica de apertura/cierre
        $('#DynamicFabMainBtn').on('click', function(e) {
            e.preventDefault();
            $(this).toggleClass('active');
            $('#DynamicFabMenu').toggleClass('show');
        });

        // Proxy de clicks en botones dinámicos (Ej. Filtros)
        $('#DynamicFabMenu button[data-proxy-target]').on('click', function(e) {
            e.preventDefault();
            const targetId = $(this).attr('data-proxy-target');
            if (targetId && $('#' + targetId).length) {
                $('#' + targetId).click(); // Simula el click en el original
            }
            $('#DynamicFabMainBtn').click(); // Cierra el menú
            document.activeElement.blur();
        });
    }
    // ==========================================
    // 🔘 GLOBAL UI HELPERS (Modales y Mensajes)
    // ==========================================
    window.mostrarMensaje = function(titulo, cuerpo, tipo) {
        tipo = tipo || 'info';
        const iconos = {
            success: '<i class="fas fa-check-circle fa-4x text-success"></i>',
            danger:  '<i class="fas fa-exclamation-circle fa-4x text-danger"></i>',
            warning: '<i class="fas fa-exclamation-triangle fa-4x text-warning"></i>',
            info:    '<i class="fas fa-info-circle fa-4x text-info"></i>'
        };
        const claseHeader = {
            success: 'bg-success text-white',
            danger:  'bg-danger text-white',
            warning: 'bg-warning text-dark',
            info:    'bg-info text-white'
        };
        const claseBtn = {
            success: 'btn-success',
            danger:  'btn-danger',
            warning: 'btn-warning',
            info:    'btn-info'
        };
        $('#modalMensajeTitulo').text(titulo);
        $('#modalMensajeCuerpo').html(cuerpo);
        $('#modalMensajeIcono').html(iconos[tipo] || iconos.info);
        $('#modalMensajeHeader').attr('class', 'modal-header ' + (claseHeader[tipo] || claseHeader.info));
        $('#modalMensajeBtnCerrar').attr('class', 'btn btn-lg px-4 ' + (claseBtn[tipo] || claseBtn.info));
        $('#modalMensajeGenerico').modal('show');
    };

    window.mostrarConfirmacion = function(titulo, cuerpo) {
        return new Promise(function(resolve) {
            $('#modalConfirmTitulo').text(titulo);
            $('#modalConfirmCuerpo').html(cuerpo);
            $('#modalConfirmBtnSi').off('click').on('click', function() {
                $('#modalConfirmacion').modal('hide');
                resolve(true);
            });
            $('#modalConfirmBtnNo').off('click').on('click', function() {
                $('#modalConfirmacion').modal('hide');
                resolve(false);
            });
            $('#modalConfirmacion').off('hidden.bs.modal.confirm').on('hidden.bs.modal.confirm', function() {
                resolve(false);
            });
            $('#modalConfirmacion').modal('show');
        });
    };
</script>

<!-- ===== MODAL GENÉRICO DE MENSAJES ===== -->
<div class="modal fade" id="modalMensajeGenerico" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg">
            <div class="modal-header" id="modalMensajeHeader">
                <h5 class="modal-title" id="modalMensajeTitulo"></h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3" id="modalMensajeIcono"></div>
                <p class="lead mb-0" id="modalMensajeCuerpo"></p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-lg px-4" id="modalMensajeBtnCerrar" data-dismiss="modal">Aceptar</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL DE CONFIRMACIÓN ===== -->
<div class="modal fade" id="modalConfirmacion" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg border-warning">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="modalConfirmTitulo"></h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3">
                    <i class="fas fa-question-circle fa-4x text-warning"></i>
                </div>
                <p class="lead mb-0" id="modalConfirmCuerpo"></p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-secondary btn-lg px-4" id="modalConfirmBtnNo">Cancelar</button>
                <button type="button" class="btn btn-danger btn-lg px-4" id="modalConfirmBtnSi">
                    <i class="fas fa-check mr-1"></i>Sí, continuar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Footer scripts slot -->
<div layout:fragment="script"></div>

</body>
</html>
