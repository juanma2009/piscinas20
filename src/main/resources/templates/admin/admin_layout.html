<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- jQuery UI (si lo usas) -->
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style th:replace="admin/shared/style"></style>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- DataTables CSS + Responsive -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        /* Estabilización del layout para evitar saltos */
        html {
            /* 1. Reserva el espacio de la barra de scroll para evitar el movimiento horizontal */
            scrollbar-gutter: stable;
            height: 100%;
        }

        body {
            height: 100% !important;
            margin: 0;
            padding: 0;
            /* 2. Evitamos el scroll horizontal y dejamos que AdminLTE maneje el vertical */
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Asegurar que el wrapper ocupe todo el espacio sin saltos */
        .wrapper {
            position: relative;
            min-height: 100%;
            display: block; /* AdminLTE prefiere block sobre flex en el wrapper principal */
        }

        .content-wrapper {
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            /* 3. Evitamos el uso de 100vh que suele causar scroll prematuro al sumarse al navbar */
            min-height: calc(100vh - 57px) !important; 
        }

        .content-wrapper > .container-fluid {
            padding-left: .5rem;
            padding-right: .5rem;
            flex: 1;
        }
        @media (min-width: 768px) {
            .content-wrapper > .container-fluid {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }

        @media (max-width: 768px) {
            .content-wrapper, .main-header {
                margin-left: 0 !important;
            }
        }

        /* 🚀 SPA Transitions */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ajax-content-loaded {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        #mainContent {
            transition: opacity 0.2s ease;
        }
        
        #mainContent.loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body class="sidebar-mini layout-fixed layout-navbar-fixed control-sidebar-slide-open">
<script>
    // 1. Inmediatamente aplicar el estado del sidebar antes del renderizado para evitar flasheos
    (function() {
        const isLandscapeTablet = window.innerWidth <= 1450 && window.innerWidth > window.innerHeight;
        const manualSidebarState = localStorage.getItem('sidebar-state');
        
        // Si es tablet o si el usuario lo cerró manualmente antes, aplicar colapso
        if (manualSidebarState === 'collapsed' || (manualSidebarState === null && isLandscapeTablet)) {
            document.body.classList.add('sidebar-collapse');
        } else if (manualSidebarState === 'expanded') {
            document.body.classList.remove('sidebar-collapse');
        }
        
        // Evitar el "rebote" de hold-transition quitando la clase inmediatamente
        document.body.classList.remove('hold-transition');
    })();
</script>
<div class="wrapper">

    <!-- Header -->
    <div th:replace="admin/shared/header"></div>

    <!-- Sidebar -->
    <div th:replace="admin/shared/left_side"></div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="container-fluid">
            <div id="mainContent" class="content">
                <div id="spa-main-wrapper">
                    <div id="contentFragment" layout:fragment="content">
                        <!-- Aquí va tu contenido -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts comunes -->
    <div th:replace="admin/shared/file_script"></div>

</div>

<!-- Popper (si lo necesitas y no lo trae file_script) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>

<!-- ✅ JS del layout (UNA sola vez) -->
<script>
    // ==========================================
    // 🚀 GLOBAL SPA NAVIGATION (Seamless UI)
    // ==========================================
    (function() {
        const $container = $("#mainContent");
        
        function loadContent(url, pushState = true) {
            $container.addClass("loading");
            
            // Simular carga con spinner si tarda más de 200ms
            const spinnerTimer = setTimeout(() => {
                if ($container.hasClass("loading")) {
                    $container.html('<div id="spa-main-wrapper"><div class="text-center p-5 mt-5"><i class="fas fa-circle-notch fa-spin fa-3x text-primary"></i><p class="mt-3 text-muted">Cargando sección...</p></div></div>');
                }
            }, 250);

            // Usar $.ajax manual para poder parsear y ejecutar scripts contenidos
            $.ajax({
                url: url,
                type: 'GET',
                success: function(response) {
                    clearTimeout(spinnerTimer);
                    $container.removeClass("loading").addClass("ajax-content-loaded");
                    
                    // Parsear el nuevo documento (true permite scripts)
                    const $parsed = $($.parseHTML(response, document, true));
                    
                    // Buscar los wrappers estables en la respuesta
                    const $newContent = $parsed.find('#spa-main-wrapper').length ? $parsed.find('#spa-main-wrapper') : $parsed.filter('#spa-main-wrapper');
                    const $newScripts = $parsed.find('#spa-script-wrapper').length ? $parsed.find('#spa-script-wrapper') : $parsed.filter('#spa-script-wrapper');
                    
                    // Si no encontramos el contenedor (puede ser una página sin layout), recargar normalmente
                    if ($newContent.length === 0) {
                        window.location.href = url;
                        return;
                    }

                    // 1. Inyectar nuevo contenido (reemplaza el interior del wrapper estable)
                    $('#spa-main-wrapper').html($newContent.html());
                    
                    // Inyectar y ejecutar nuevos scripts
                    if ($newScripts.length > 0) {
                        $('#spa-script-wrapper').empty().append($newScripts.contents());
                    }

                    // 2. Actualizar URL y Título
                    if (pushState) {
                        history.pushState({ url: url }, "", url);
                    }
                    const pageTitle = response.match(/<title>([^<]+)<\/title>/);
                    if (pageTitle && pageTitle[1]) document.title = pageTitle[1];

                    // 3. Re-inicializar componentes Globales
                    if (window.initAutoDataTables) window.initAutoDataTables("#spa-main-wrapper");
                    if (window.initAutoCollapseSidebar) window.initAutoCollapseSidebar();
                    if (window.SessionMonitor) window.SessionMonitor.reset();
                    
                    if ($.fn.layout) $('body').layout('fix');
                    
                    // 4. Scroll al inicio y actualizar Sidebar
                    window.scrollTo(0, 0);
                    $(".nav-sidebar .nav-link").removeClass("active");
                    $(`.nav-sidebar a[href="${url}"]`).addClass("active").parents('.nav-item').addClass('menu-open').children('.nav-link').addClass('active');

                    // Fin animación
                    setTimeout(() => $container.removeClass("ajax-content-loaded"), 500);
                },
                error: function(xhr) {
                    clearTimeout(spinnerTimer);
                    $container.removeClass("loading");
                    if (xhr.status === 401 || xhr.status === 403) {
                        window.location.reload(); // Dejar que Spring Security redirija al login
                    } else {
                        $container.html('<div class="alert alert-danger m-3"><h4><i class="icon fas fa-ban"></i> Error</h4> No se pudo cargar la página. Código: ' + xhr.status + '</div>');
                    }
                }
            });
        }

        // Interceptar clicks en TODA la aplicación
        $(document).on("click", "a", function (e) {
            const href = $(this).attr("href");
            const target = $(this).attr("target");
            
            // Exclusiones: Enlaces externos, anclas, javascript, logout, o marcados con data-ajax="false"
            if (!href || href === "#" || href.startsWith("javascript:") || href.startsWith("mailto:") || 
                href.includes("logout") || target === "_blank" || $(this).data("ajax") === false ||
                href.startsWith("http") && !href.includes(window.location.host)) {
                return;
            }

            e.preventDefault();
            loadContent(href);
        });

        // Manejar botones de atrás/adelante del navegador
        window.onpopstate = function(event) {
            if (event.state && event.state.url) {
                loadContent(event.state.url, false);
            } else {
                // Si no hay estado, cargar la URL actual sin pushState
                loadContent(window.location.pathname, false);
            }
        };
    })();

    // ==========================================
    // 🛡️ SESSION MONITORING (Auto logout warning)
    // ==========================================
    const SessionMonitor = (function() {
        const timeoutSecs = 1000; // Match server timeout (application.properties)
        const warningSecs = 900;  // Warn at 15 minutes
        let idleTimer;
        let warningTimer;

        function startTimer() {
            clearTimeout(idleTimer);
            clearTimeout(warningTimer);
            
            // Set timer for the warning
            idleTimer = setTimeout(showWarning, warningSecs * 1000);
        }

        function showWarning() {
            window.mostrarConfirmacion(
                "¡Sesión a punto de caducar!",
                "Tu sesión se cerrará pronto por inactividad. ¿Deseas continuar conectado?"
            ).then(confirmed => {
                if (confirmed) {
                    refreshSession();
                } else {
                    window.location.href = "/logout";
                }
            });

            // If no action is taken within the remaining time, force logout
            const remainingSecs = timeoutSecs - warningSecs;
            warningTimer = setTimeout(() => {
                window.location.href = "/login?logout=timeout";
            }, remainingSecs * 1000);
        }

        function refreshSession() {
            clearTimeout(warningTimer);
            fetch('/api/session-ping')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        startTimer(); // Restart the cycle
                    }
                })
                .catch(err => {
                    console.error("Session refresh failed", err);
                    window.location.href = "/login?error=session_expired";
                });
        }

        return {
            init: startTimer,
            reset: function() {
                startTimer();
                // Si el modal estaba abierto (por una carga lenta o inactividad previa), cerrarlo
                $('#sessionWarningModal').modal('hide');
            }
        };
    })();

    $(function () {
        if (window.initAutoDataTables) window.initAutoDataTables(document);
        initDynamicMobileFAB();
        initAutoCollapseSidebar();
        
        // Iniciar monitoreo de sesión
        SessionMonitor.init();
    });

    // Resetear timer en navegación AJAX
    $(document).on("ajaxComplete", function() {
        SessionMonitor.reset();
    });

    // ==========================================
    // 🛠️ AUTO COLLAPSE SIDEBAR (Landscape/Tablets)
    // ==========================================
    // ==========================================
    // 🛠️ AUTO COLLAPSE & PERSISTENCE (Sidebar)
    // ==========================================
    function initAutoCollapseSidebar() {
        // Escuchar eventos de AdminLTE para persistir la elección del usuario
        $(document).on('collapsed.lte.pushmenu', function() {
            localStorage.setItem('sidebar-state', 'collapsed');
        });
        $(document).on('shown.lte.pushmenu', function() {
            localStorage.setItem('sidebar-state', 'expanded');
        });

        function checkOrientation() {
            // Solo auto-colapsar si el usuario NO ha guardado una preferencia manual aún
            if (!localStorage.getItem('sidebar-state')) {
                if (window.innerWidth <= 1450 && window.innerWidth > window.innerHeight) {
                    $('body').addClass('sidebar-collapse').removeClass('sidebar-open');
                }
            }
        }
        
        // Revisar al rotar la pantalla
        $(window).on('resize orientationchange', checkOrientation);
    }

    // ==========================================
    // 🔘 GLOBAL DYNAMIC FAB GENERATOR PARA MÓVILES
    // ==========================================
    function initDynamicMobileFAB() {
        const $toolbar = $('.toolbar');
        if ($toolbar.length === 0) return;

        // Limpiar FABs previos inyectados estáticamente para evitar duplicados
        $('.fab-wrapper').remove();

        // Ocultar el toolbar original en móviles
        $toolbar.addClass('d-none d-md-flex');

        // Construir la estructura principal del FAB
        let fabHtml = `
        <div class="fab-wrapper d-block d-md-none">
            <div class="fab-menu" id="DynamicFabMenu">`;

        // Procesar los botones del toolbar (invertidos para que el primero quede más abajo)
        const $buttons = $toolbar.find('a, button').filter(function() {
             return $(this).text().trim() !== ''; 
        }).get().reverse();

        $($buttons).each(function() {
            const $el = $(this);
            const iconHtml = $el.find('i').prop('outerHTML') || '<i class="fas fa-chevron-right"></i>';
            const labelText = $el.text().trim();
            
            // Colores por defecto según clase
            let btnClasses = "fab-item text-white border-0 ";
            if ($el.hasClass("btn-outline-success") || $el.hasClass("btn-success") || labelText.includes('Nuevo')) btnClasses += "bg-success";
            else if ($el.hasClass("btn-outline-info") || $el.hasClass("btn-info") || labelText.includes('Galería')) btnClasses += "bg-info";
            else if ($el.hasClass("btn-outline-warning") || $el.hasClass("btn-warning") || labelText.includes('Filtros')) btnClasses += "bg-warning text-dark";
            else if ($el.hasClass("btn-outline-danger") || $el.hasClass("btn-danger")) btnClasses += "bg-danger";
            else btnClasses += "bg-primary";

            if ($el.is('a')) {
                const href = $el.attr('href');
                let extraAttributes = '';
                if($el.attr('data-toggle')) extraAttributes += `data-toggle="${$el.attr('data-toggle')}" `;
                if($el.attr('data-target')) extraAttributes += `data-target="${$el.attr('data-target')}" `;

                fabHtml += `
                <div class="fab-item-container">
                    <span class="fab-label">${labelText}</span>
                    <a href="${href}" class="${btnClasses}" title="${labelText}" ${extraAttributes}>${iconHtml}</a>
                </div>`;
            } else {
                const targetId = $el.attr('id') || ''; 
                fabHtml += `
                <div class="fab-item-container">
                    <span class="fab-label">${labelText}</span>
                    <button type="button" class="${btnClasses}" data-proxy-target="${targetId}" title="${labelText}">${iconHtml}</button>
                </div>`;
            }
        });

        fabHtml += `
            </div>
            <button type="button" class="fab-btn bg-primary text-white" id="DynamicFabMainBtn">
                <i class="fas fa-plus"></i>
            </button>
        </div>`;

        // Injectar al DOM
        $('body').append(fabHtml);

        // Lógica de apertura/cierre
        $('#DynamicFabMainBtn').on('click', function(e) {
            e.preventDefault();
            $(this).toggleClass('active');
            $('#DynamicFabMenu').toggleClass('show');
        });

        // Proxy de clicks en botones dinámicos (Ej. Filtros)
        $('#DynamicFabMenu button[data-proxy-target]').on('click', function(e) {
            e.preventDefault();
            const targetId = $(this).attr('data-proxy-target');
            if (targetId && $('#' + targetId).length) {
                $('#' + targetId).click(); // Simula el click en el original
            }
            $('#DynamicFabMainBtn').click(); // Cierra el menú
            document.activeElement.blur();
        });
    }
    // ==========================================
    // 🔘 GLOBAL UI HELPERS (Modales y Mensajes)
    // ==========================================
    window.mostrarMensaje = function(titulo, cuerpo, tipo) {
        tipo = tipo || 'info';
        const iconos = {
            success: '<i class="fas fa-check-circle fa-4x text-success"></i>',
            danger:  '<i class="fas fa-exclamation-circle fa-4x text-danger"></i>',
            warning: '<i class="fas fa-exclamation-triangle fa-4x text-warning"></i>',
            info:    '<i class="fas fa-info-circle fa-4x text-info"></i>'
        };
        const claseHeader = {
            success: 'bg-success text-white',
            danger:  'bg-danger text-white',
            warning: 'bg-warning text-dark',
            info:    'bg-info text-white'
        };
        const claseBtn = {
            success: 'btn-success',
            danger:  'btn-danger',
            warning: 'btn-warning',
            info:    'btn-info'
        };
        $('#modalMensajeTitulo').text(titulo);
        $('#modalMensajeCuerpo').html(cuerpo);
        $('#modalMensajeIcono').html(iconos[tipo] || iconos.info);
        $('#modalMensajeHeader').attr('class', 'modal-header ' + (claseHeader[tipo] || claseHeader.info));
        $('#modalMensajeBtnCerrar').attr('class', 'btn btn-lg px-4 ' + (claseBtn[tipo] || claseBtn.info));
        $('#modalMensajeGenerico').modal('show');
    };

    window.mostrarConfirmacion = function(titulo, cuerpo) {
        return new Promise(function(resolve) {
            $('#modalConfirmTitulo').text(titulo);
            $('#modalConfirmCuerpo').html(cuerpo);
            $('#modalConfirmBtnSi').off('click').on('click', function() {
                $('#modalConfirmacion').modal('hide');
                resolve(true);
            });
            $('#modalConfirmBtnNo').off('click').on('click', function() {
                $('#modalConfirmacion').modal('hide');
                resolve(false);
            });
            $('#modalConfirmacion').off('hidden.bs.modal.confirm').on('hidden.bs.modal.confirm', function() {
                resolve(false);
            });
            $('#modalConfirmacion').modal('show');
        });
    };
</script>

<!-- ===== MODAL GENÉRICO DE MENSAJES ===== -->
<div class="modal fade" id="modalMensajeGenerico" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg">
            <div class="modal-header" id="modalMensajeHeader">
                <h5 class="modal-title" id="modalMensajeTitulo"></h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3" id="modalMensajeIcono"></div>
                <p class="lead mb-0" id="modalMensajeCuerpo"></p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-lg px-4" id="modalMensajeBtnCerrar" data-dismiss="modal">Aceptar</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL DE CONFIRMACIÓN ===== -->
<div class="modal fade" id="modalConfirmacion" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg border-warning">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="modalConfirmTitulo"></h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3">
                    <i class="fas fa-question-circle fa-4x text-warning"></i>
                </div>
                <p class="lead mb-0" id="modalConfirmCuerpo"></p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-secondary btn-lg px-4" id="modalConfirmBtnNo">Cancelar</button>
                <button type="button" class="btn btn-danger btn-lg px-4" id="modalConfirmBtnSi">
                    <i class="fas fa-check mr-1"></i>Sí, continuar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Footer scripts slot estático para SPA -->
<div id="spa-script-wrapper">
    <div layout:fragment="script"></div>
</div>


</body>
</html>
