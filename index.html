<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Taller Joyería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-jewelry { background-color: #1a1c20; }
        .img-container { background-color: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 0.75rem; overflow: hidden; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="border-b p-4 flex justify-between items-center">
        <img src="logo.PNG" alt="Logo" class="h-10">
        <span class="font-bold text-blue-600">DEMO ACTIVA</span>
    </nav>

    <section class="bg-jewelry py-12 text-center text-white">
        <h1 class="text-3xl font-bold mb-8">Software de Gestión Joyera</h1>
        <div class="max-w-4xl mx-auto px-4">
            <img src="dashboard.PNG" alt="Dashboard" class="rounded shadow-2xl w-full">
        </div>
    </section>

    <section class="py-16 container mx-auto px-6">
        <div class="flex flex-wrap items-center mb-16">
            <div class="w-full md:w-1/2 mb-6">
                <img src="analisis.PNG" alt="Análisis" class="rounded-lg shadow border w-full">
            </div>
            <div class="w-full md:w-1/2 md:pl-10">
                <h2 class="text-2xl font-bold mb-3">Análisis del Cliente</h2>
                <p class="text-gray-600">Gráficos de pedidos y facturación anual detallada.</p>
            </div>
        </div>

        <div class="flex flex-wrap items-center flex-row-reverse mb-16">
            <div class="w-full md:w-1/2 mb-6">
                <img src="checklist.PNG" alt="Checklist" class="rounded-lg shadow border w-full">
            </div>
            <div class="w-full md:w-1/2 md:pr-10 text-right">
                <h2 class="text-2xl font-bold mb-3">Control de Procesos</h2>
                <p class="text-gray-600">Gestión de etapas desde recepción hasta calidad.</p>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="text-center p-4 border rounded-xl">
                <img src="acciones.PNG" class="mb-4 rounded w-full">
                <p class="font-bold">Acciones Rápidas</p>
            </div>
            <div class="text-center p-4 border rounded-xl">
                <img src="citas.PNG" class="mb-4 rounded w-full">
                <p class="font-bold">Gestión de Citas</p>
            </div>
            <div class="text-center p-4 border rounded-xl">
                <img src="material.PNG" class="mb-4 rounded w-full">
                <p class="font-bold">Compra de Material</p>
            </div>
        </div>
    </section>

</body>
</html>
